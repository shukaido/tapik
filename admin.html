  });

};

// ================= Cross-App BroadcastChannel =================
const tapikChannel = new BroadcastChannel('tapik-orders');

const setLang = (lang) => {
  _currentLang = lang;
  localStorage.setItem('tapik_lang', lang);
  if (setLangState_global) setLangState_global(lang);
  try {
    tapikChannel.postMessage({ type: 'LANG_CHANGE', lang });
  } catch(e) {}
};

tapikChannel.addEventListener('message', (e) => {
  if (e.data.type === 'LANG_CHANGE') {
    _currentLang = e.data.lang;
    localStorage.setItem('tapik_lang', e.data.lang);
    window.location.reload();
  }
});

const StatusBadge = ({status}) => {

const HealthBar = ({score}) => {
  const color = score >= 80 ? 'bg-green-500' : score >= 50 ? 'bg-amber-500' : 'bg-red-500';
  return (
    <div className="flex items-center gap-2">
      <div className="w-16 h-1.5 bg-slate-700 rounded-full"><div className={`h-full rounded-full ${color}`} style={{width:`${score}%`}}/></div>
      <span className={`text-xs font-bold tabular ${score >= 80 ? 'text-green-400' : score >= 50 ? 'text-amber-400' : 'text-red-400'}`}>{score}</span>
    </div>
  );
};

// ================= Reward Mode Config =================
const REWARD_MODES = {
  default: {
    nameKey: 'reward_mode_default',
    descKey: 'reward_mode_default_desc',
    color: 'green',
    tiers: [
      { rangeKey: 'tier_range_default_1', joiner: 5.50, creator: 6.00 },
      { rangeKey: 'tier_range_default_2', joiner: 5.75, creator: 6.50 },
      { rangeKey: 'tier_range_default_3', joiner: 6.00, creator: 7.00 },
    ],
    getRate(n) {
      if (n <= 4) return { joiner: 5.50, creator: 6.00 };
      if (n <= 6) return { joiner: 5.75, creator: 6.50 };
      return { joiner: 6.00, creator: 7.00 };
    }
  },
  spot: {
    nameKey: 'reward_mode_spot',
    descKey: 'reward_mode_spot_desc',
    color: 'amber',
    tiers: [
      { rangeKey: 'tier_range_spot_3', joiner: 5.50, creator: 6.00 },
      { rangeKey: 'tier_range_spot_4', joiner: 5.70, creator: 6.40 },
      { rangeKey: 'tier_range_spot_5', joiner: 5.90, creator: 6.80 },
      { rangeKey: 'tier_range_spot_6', joiner: 6.10, creator: 7.20 },
      { rangeKey: 'tier_range_spot_7', joiner: 6.30, creator: 7.60 },
      { rangeKey: 'tier_range_spot_8', joiner: 6.50, creator: 8.00 },
    ],
    getRate(n) {
      const j = 5.5 + (Math.min(n,8) - 3) * 0.2;
      const c = 6.0 + (Math.min(n,8) - 3) * 0.4;
      return { joiner: Math.round(j*100)/100, creator: Math.round(c*100)/100 };
    }
  },
  hotspot: {
    nameKey: 'reward_mode_hotspot',
    descKey: 'reward_mode_hotspot_desc',
    color: 'red',
    tiers: [
      { rangeKey: 'tier_range_hotspot_3', joiner: 5.50, creator: 6.00 },
      { rangeKey: 'tier_range_hotspot_4', joiner: 6.04, creator: 7.08 },
      { rangeKey: 'tier_range_hotspot_5', joiner: 6.40, creator: 7.80 },
      { rangeKey: 'tier_range_hotspot_6', joiner: 6.66, creator: 8.31 },
      { rangeKey: 'tier_range_hotspot_7', joiner: 6.85, creator: 8.70 },
      { rangeKey: 'tier_range_hotspot_8', joiner: 7.00, creator: 9.00 },
    ],
    getRate(n) {
      const bonus = n * 3.5 - (8.5 + (Math.min(n,8)-3)*0.3);
      let jb = bonus / (n+1), cb = 2*jb;
      if (cb+5 > 10) { cb=5; jb=(bonus-cb)/(n-1); }
      return { joiner: Math.round((5+jb)*100)/100, creator: Math.round((5+cb)*100)/100 };
    }
  },
};

const SettingsTab = () => {
  const [mode, setMode] = useState('default');
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [lastSaved, setLastSaved] = useState(null);

  // Load current setting from Firestore
  useEffect(() => {
    if (!window.AFB) return;
    AFB.getDoc(AFB.doc(AFB.db, 'settings', 'rewardMode')).then(snap => {
      if (snap.exists()) {
        const data = snap.data();
        if (data.mode && REWARD_MODES[data.mode]) setMode(data.mode);
        if (data.updatedAt) setLastSaved(data.updatedAt.toDate?.() || null);
      }
    }).catch(()=>{});
  }, []);

  const handleSave = async () => {
    if (!window.AFB) return;
    setSaving(true);
    try {
      const modeData = REWARD_MODES[mode];
      await AFB.setDoc(AFB.doc(AFB.db, 'settings', 'rewardMode'), {
        mode,
        nameKey: modeData.nameKey,
        tiers: modeData.tiers,
        updatedAt: AFB.serverTimestamp(),
        updatedBy: 'admin',
      });
      setSaved(true);
      setLastSaved(new Date());
      setTimeout(() => setSaved(false), 2000);

                <td className="px-4 py-2.5 text-purple-400 tabular font-bold">{tier.creator.toFixed(2)}%</td>
                <td className="px-4 py-2.5 text-slate-300 tabular">+{(tier.joiner - 5).toFixed(2)}%</td>
                <td className="px-4 py-2.5 text-slate-300 tabular">+{(tier.creator - 5).toFixed(2)}%</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* BEP simulation for selected mode */}
      <div className="bg-slate-800/50 border border-slate-700 rounded-xl overflow-hidden mb-6">
        <div className="px-4 py-3 border-b border-slate-700">
          <div className="text-sm font-bold text-white">{t('bep_simulation')}</div>
        </div>
        <table className="w-full text-xs">
          <thead>
            <tr className="border-b border-slate-700">
              {[t('column_members_n'),t('column_tapik_income'),t('column_bonus_total'),t('column_tapik_net'),t('column_change')].map(h => (
                <th key={h} className="text-left px-4 py-2.5 text-slate-400 font-medium">{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[3,4,5,6,7,8].map((n, i) => {
              const rate = REWARD_MODES[mode].getRate(n);
              const income = n * 3.5;
              const bonus = (rate.joiner - 5) * (n-1) + (rate.creator - 5);
              const net = income - bonus;
              const prevRate = i > 0 ? REWARD_MODES[mode].getRate(n-1) : null;
              const prevNet = prevRate ? ((n-1)*3.5 - ((prevRate.joiner-5)*(n-2) + (prevRate.creator-5))) : null;
              const delta = prevNet !== null ? net - prevNet : null;
              return (
                <tr key={n} className="border-b border-slate-800">
                  <td className="px-4 py-2.5 text-white font-bold">{t('members_n_format', {n})}</td>
                  <td className="px-4 py-2.5 text-green-400 tabular">{income.toFixed(1)}%</td>
                  <td className="px-4 py-2.5 text-red-400 tabular">{bonus.toFixed(2)}%</td>
                  <td className="px-4 py-2.5 text-white font-bold tabular">{net.toFixed(2)}%</td>
                  <td className={`px-4 py-2.5 tabular font-bold ${delta===null?'text-slate-500':delta>=0?'text-green-400':'text-red-400'}`}>
                    {delta === null ? '—' : `${delta >= 0 ? '+' : ''}${delta.toFixed(2)}%`}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Operation guide */}
      <div className="mt-6 bg-slate-800/30 border border-slate-700/50 rounded-xl p-4">
        <div className="text-sm font-bold text-slate-300 mb-2">{t('operation_guide')}</div>
        <div className="space-y-1.5 text-[11px] text-slate-400">
          <div>• <span className="text-green-400 font-bold">{t('reward_mode_default')}</span>: {t('guide_default')}</div>
          <div>• <span className="text-amber-400 font-bold">{t('reward_mode_spot')}</span>: {t('guide_spot')}</div>
          <div>• <span className="text-red-400 font-bold">{t('reward_mode_hotspot')}</span>: {t('guide_hotspot')}</div>
          <div className="text-slate-500 mt-2">※ {t('guide_recommendation')}</div>
        </div>
      </div>
    </div>
  );
};

// ================= Main =================
function AdminApp() {
  const [tab, setTab] = useState('overview');
  const [liveFeed, setLiveFeed] = useState([]);
  const [liveKPI, setLiveKPI] = useState({orders:0, gmv:0});
  const [lang, setLangState] = useState(_currentLang);

  // Store the state setter globally so setLang can access it
  useEffect(() => {
    setLangState_global = setLangState;
  }, []);

  // BroadcastChannel: 모든 앱 이벤트 수신 → 라이브 피드
  useEffect(() => {
    const handler = (e) => {
      const d = e.data;
      const now = new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'});
      if (d.type === 'order.placed') {
        setLiveFeed(prev => [{id:d.order.id, store:d.order.storeName||t('default_store_name'), consumer:d.order.customerName||t('default_consumer_name'), items:d.order.items?.map(i=>i.name).join(', ')||'', amount:d.order.total, status:'ORDERED', room:d.order.role!=='solo'?'Room':'', time:now}, ...prev].slice(0,20));
        setLiveKPI(prev => ({orders:prev.orders+1, gmv:Math.round((prev.gmv+(d.order.total||0))*100)/100}));
      } else if (d.type === 'order.accepted') {
        setLiveFeed(prev => prev.map(f => f.id===d.orderId ? {...f, status:'PREPARING'} : f));
      } else if (d.type === 'order.ready') {
        setLiveFeed(prev => prev.map(f => f.id===d.orderId ? {...f, status:'READY'} : f));
      } else if (d.type === 'order.pickedUp') {
        setLiveFeed(prev => prev.map(f => f.id===d.orderId ? {...f, status:'PICKED_UP'} : f));
      }
    };
    tapikChannel.addEventListener('message', handler);
    return () => tapikChannel.removeEventListener('message', handler);
  }, []);

  // Firestore: 전체 주문 실시간 감시
  useEffect(() => {
    if (!window.AFB) return;
    const q = AFB.query(AFB.collection(AFB.db, 'orders'));
    const unsub = AFB.onSnapshot(q, (snap) => {
      const now = new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'});
      snap.docChanges().forEach(change => {
        const o = change.doc.data();
        if (change.type === 'added') {
          setLiveFeed(prev => {
            if (prev.some(f => f.id === o.id)) return prev;
            return [{id:o.id, store:o.storeName||t('default_store_name'), consumer:o.customerName||t('default_consumer_name'), items:(o.items||[]).map(i=>i.name).join(', '), amount:o.total, status:o.status, room:o.role!=='solo'?'Room':'', time:now, source:'firebase'}, ...prev].slice(0,30);
          });
          setLiveKPI(prev => ({orders:prev.orders+1, gmv:Math.round((prev.gmv+(o.total||0))*100)/100}));
        } else if (change.type === 'modified') {
          setLiveFeed(prev => prev.map(f => f.id === o.id ? {...f, status: o.status} : f));
        }
      });
    });
    return unsub;
  }, []);

  const tabs = [
    {id:'overview', labelKey:'tab_overview', icon:'📊'},
    {id:'merchants', labelKey:'tab_merchants', icon:'🏪'},
    {id:'consumers', labelKey:'tab_consumers', icon:'👥'},
    {id:'transactions', labelKey:'tab_transactions', icon:'💳'},
    {id:'room', labelKey:'tab_room', icon:'🚪'},
    {id:'settlement', labelKey:'tab_settlement', icon:'💰'},
    {id:'anomaly', labelKey:'tab_anomaly', icon:'🚨'},
    {id:'settings', labelKey:'tab_settings', icon:'⚙️'},
  ];

  return (
    <div className="min-h-screen bg-slate-900 flex">
      {/* Sidebar */}
      <div className="w-52 bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0">
        <div className="p-4 border-b border-slate-800">
          <div className="flex items-center justify-between mb-3">
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z"/></svg>
              </div>
              <div>
                <div className="text-white font-bold text-sm">{t('admin_title')}</div>
                <div className="text-[9px] text-slate-500">{t('admin_version')}</div>
              </div>
            </div>
            <div className="flex gap-1 bg-slate-800 rounded-lg p-1">
              <button onClick={()=>setLang('en')} className={`px-2 py-1 rounded text-[10px] font-bold ${_currentLang==='en'?'bg-amber-500 text-white':'text-slate-400'}`}>EN</button>
              <button onClick={()=>setLang('ko')} className={`px-2 py-1 rounded text-[10px] font-bold ${_currentLang==='ko'?'bg-amber-500 text-white':'text-slate-400'}`}>KR</button>
            </div>
          </div>
        </div>
        <nav className="flex-1 p-2">
          {tabs.map(tab_item => (
            <button key={tab_item.id} onClick={()=>setTab(tab_item.id)}
              className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm mb-0.5 transition ${tab===tab_item.id ? 'bg-amber-500/10 text-amber-400 font-medium' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>
              <span className="text-base">{tab_item.icon}</span>
              <span>{t(tab_item.labelKey)}</span>
              {tab_item.id === 'anomaly' && <span className="ml-auto bg-amber-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full">{ANOMALIES.filter(a=>a.statusKey==='anomaly_status_open').length}</span>}
            </button>
          ))}
        </nav>
        <div className="p-3 border-t border-slate-800">
          <div className="flex items-center gap-2 px-2">
            <div className="w-7 h-7 rounded-full bg-slate-700 flex items-center justify-center text-[10px] font-bold text-white">GA</div>
            <div>
              <div className="text-xs text-white">{t('user_name')}</div>
              <div className="text-[9px] text-slate-500">{t('user_role')}</div>
            </div>
          </div>
        </div>
      </div>

      {/* Main content */}
      <div className="flex-1 overflow-hidden">
        {tab === 'overview' && <OverviewTab liveFeed={liveFeed} liveKPI={liveKPI}/>}
        {tab === 'merchants' && <MerchantsTab/>}
        {tab === 'consumers' && <ConsumersTab/>}
        {tab === 'transactions' && <TransactionsTab/>}
        {tab === 'room' && <RoomTab/>}
        {tab === 'settlement' && <SettlementTab/>}
        {tab === 'anomaly' && <AnomalyTab/>}
        {tab === 'settings' && <SettingsTab/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp/>);
</script>
</body>
</html>
