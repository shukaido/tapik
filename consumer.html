// Language state — default EN for ShardLab evaluators
let _currentLang = localStorage.getItem('tapik_lang') || 'en';
const t = (key, params = {}) => {
  let str = LANG[_currentLang]?.[key] || LANG['en'][key] || key;
  Object.entries(params).forEach(([k, v]) => { str = str.replace(`{${k}}`, v); });
  return str;
};
const setLang = (lang) => {
  _currentLang = lang;
  localStorage.setItem('tapik_lang', lang);
  // Broadcast to other apps
  tapikChannel.postMessage({ type: 'LANG_CHANGE', lang });
};

// Listen for cross-app language changes
tapikChannel.addEventListener('message', (e) => {
  if (e.data.type === 'LANG_CHANGE') {
    _currentLang = e.data.lang;
    localStorage.setItem('tapik_lang', e.data.lang);
    // Trigger re-render by dispatching a custom event
    window.dispatchEvent(new CustomEvent('tapikLangChange', { detail: { lang: e.data.lang } }));
  }
});

// ================= v5 Revenue Model Engine (동적 적립률) =================
const TAPIK = {
  MARKUP: 0.05,
  MERCHANT_COMM: 0.10,
  GATEWAY_PCT: 0.012,
  GATEWAY_FIXED: 0.15,
  PTS_PER_SEN: 1,
  POINTS_SOLO: 0.05,      // Solo 기본 적립률
  ROOM_MIN: 3,             // 최소 3명부터
  ROOM_MAX: 8,
  ROOM_TIMEOUT: 30,
  TP_CAP: 100000,          // 최대 적립 한도 100,000 TP = RM 1,000
};

// Reward modes - names are displayed dynamically with t()
const REWARD_MODES = {
  default: {
    nameKey: 'reward.mode.default', descKey: 'reward.mode.default.desc',
    getRate(n) {
      if (n <= 4) return { joiner: 5.50, creator: 6.00 };
      if (n <= 6) return { joiner: 5.75, creator: 6.50 };
      return { joiner: 6.00, creator: 7.00 };
    }
  },
  spot: {
    nameKey: 'reward.mode.spot', descKey: 'reward.mode.spot.desc',
    getRate(n) {
      const j = 5.5 + (Math.min(n,8) - 3) * 0.2;
      const c = 6.0 + (Math.min(n,8) - 3) * 0.4;
      return { joiner: Math.round(j*100)/100, creator: Math.round(c*100)/100 };
    }
  },
  hotspot: {
    nameKey: 'reward.mode.hotspot', descKey: 'reward.mode.hotspot.desc',
    getRate(n) {
      const BASE = 3.5, SOLO = 5.0;
      const target_net = 8.5 + (Math.min(n,8) - 3) * 0.3;
      const bonus_needed = n * BASE - target_net;
      let jb = bonus_needed / (n + 1);
      let cb = 2 * jb;
      if (cb + SOLO > 10.0) { cb = 5.0; jb = (bonus_needed - cb) / (n - 1); }
      return { joiner: Math.round((SOLO + jb)*100)/100, creator: Math.round((SOLO + cb)*100)/100 };
    }
  },
};

// 전역 적립률 모드 상태 (Firestore에서 읽어옴)
let _activeRewardMode = 'default';

// Firestore에서 적립률 모드 실시간 구독
function subscribeRewardMode(onUpdate) {
  return FB.onSnapshot(FB.doc(FB.db, 'settings', 'rewardMode'), (snap) => {
    if (snap.exists()) {
      const data = snap.data();
      if (data.mode && REWARD_MODES[data.mode]) {
        _activeRewardMode = data.mode;
        if (onUpdate) onUpdate(data.mode);
      }
    }
  });
}

// 현재 적립률 가져오기
function getActiveRate(roomMemberCount) {
  const mode = REWARD_MODES[_activeRewardMode] || REWARD_MODES.default;
  return mode.getRate(roomMemberCount || 3);
}

function calcOrder(basePrice, qty = 1, roomRole = 'solo', roomMemberCount = 1) {
  const base = basePrice * qty;
  const serviceFee = Math.round(base * TAPIK.MARKUP * 100) / 100;
  const total = Math.round((base + serviceFee) * 100) / 100;
  let pointsRate = TAPIK.POINTS_SOLO;
  if (roomRole === 'joiner' || roomRole === 'creator') {
    const rates = getActiveRate(roomMemberCount);
    pointsRate = roomRole === 'creator' ? rates.creator / 100 : rates.joiner / 100;
  }
  const pointsRM = Math.round(base * pointsRate * 100) / 100;
  const pointsTP = Math.round(pointsRM * 100);
  const merchantComm = Math.round(total * TAPIK.MERCHANT_COMM * 100) / 100;
  const merchantNet = Math.round((total - merchantComm) * 100) / 100;
  const gatewayFee = Math.round((total * TAPIK.GATEWAY_PCT + TAPIK.GATEWAY_FIXED) * 100) / 100;
  const tapikNet = Math.round((merchantComm - pointsRM - gatewayFee) * 100) / 100;
  return { base, serviceFee, total, pointsRM, pointsTP, merchantComm, merchantNet, gatewayFee, tapikNet, pointsRate };
}

          <span className="text-xs text-gray-500">{t('store.queue',{n: queue?.ahead ?? store.queueAhead})} · {(queue?.ahead ?? store.queueAhead) > 0 ? t('store.wait',{min:`${queue?.waitMin?.[0] ?? store.waitMin[0]}~${queue?.waitMin?.[1] ?? store.waitMin[1]}`}) : '바로 가능'}</span>

// CHECKOUT
const CheckoutScreen = ({store, cart, onBack, onPay, joinedRoom}) => {
  const [roomMode, setRoomMode] = useState(joinedRoom && joinedRoom.storeId === store.id ? 'join' : 'solo');
  const [roomType, setRoomType] = useState('public');
  const [pointsUse, setPointsUse] = useState(0);

  const items = Object.entries(cart).filter(([,q])=>q>0).map(([id,qty]) => {
    const m = store.menu.find(x=>x.id===id);
    return {id, name:m.name, basePrice:m.basePrice, qty};
  });
  const base = items.reduce((s,i)=>s+i.basePrice*i.qty, 0);
  const serviceFee = Math.round(base * TAPIK.MARKUP * 100) / 100;
  const total = Math.round((base + serviceFee - pointsUse/100) * 100) / 100;
  const role = roomMode === 'solo' ? 'solo' : roomMode === 'create' ? 'creator' : roomMode === 'join' ? 'joiner' : 'solo';
  const ptsRate = role === 'creator' ? TAPIK.POINTS_CREATOR : role === 'joiner' ? TAPIK.POINTS_JOINER : TAPIK.POINTS_SOLO;
  const ptsEarn = Math.round(base * ptsRate * 100);
  const ptsLabel = role === 'creator' ? t('points.creator') : role === 'joiner' ? t('points.joiner') : t('points.solo');

  return (
    <div className="bg-white min-h-full">
      <div className="sticky top-0 bg-white border-b border-gray-100 px-4 pt-12 pb-3 flex items-center gap-3 z-10">
        <button onClick={onBack} className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center"><I.ChevronLeft s={18}/></button>
        <div className="font-bold text-gray-900">{t('checkout.title')}</div>
      </div>

      <div className="px-4 py-4 space-y-4">
        {/* Store */}
        <div className="flex items-center gap-3 bg-gray-50 rounded-xl p-3">
          <div className={`w-12 h-12 rounded-lg ${store.photos[0]}`}/>
          <div>
            <div className="font-bold text-sm text-gray-900">{store.name}</div>
            <div className="text-xs text-gray-500">{store.area}</div>
          </div>
        </div>

        {/* Items */}
        <div>
          {items.map(item => (
            <div key={item.id} className="flex justify-between py-2 border-b border-gray-50">
              <div className="text-sm text-gray-700">{item.name} × {item.qty}</div>
              <div className="text-sm font-medium text-gray-900">RM {(item.basePrice * item.qty).toFixed(2)}</div>
            </div>
          ))}
          <div className="flex justify-between py-2 border-b border-gray-50">
            <div className="text-sm text-gray-500">{t('checkout.subtotal')}</div>
            <div className="text-sm text-gray-700">RM {base.toFixed(2)}</div>
          </div>
          <div className="flex justify-between py-2 border-b border-gray-50">
            <div className="text-sm text-gray-500">{t('checkout.service')}</div>
            <div className="text-sm text-gray-700">RM {serviceFee.toFixed(2)}</div>
          </div>
          {pointsUse > 0 && (
            <div className="flex justify-between py-2 border-b border-gray-50">
              <div className="text-sm text-green-600">{t('checkout.points_use')}</div>
              <div className="text-sm text-green-600">-RM {(pointsUse/100).toFixed(2)}</div>
            </div>
          )}
          <div className="flex justify-between py-3">
            <div className="font-bold text-gray-900">{t('checkout.total')}</div>
            <div className="font-bold text-lg text-gray-900">RM {total.toFixed(2)}</div>
          </div>
        </div>

        {/* Room option */}
        <div className="bg-purple-50 rounded-xl p-3">
          <div className="text-xs font-bold text-purple-800 mb-2">Room 옵션</div>
          <div className="flex gap-2">
            {[{id:'solo', label:t('checkout.solo'), sub:t('points.solo')},
              {id:'join', label:t('checkout.room_join'), sub:t('points.joiner')},
              {id:'create', label:t('checkout.room_create'), sub:t('points.creator')},
            ].map(opt => (
              <button key={opt.id} onClick={()=>setRoomMode(opt.id)}
                className={`flex-1 p-2.5 rounded-lg border-2 text-center transition ${roomMode===opt.id ? 'border-purple-500 bg-white' : 'border-transparent bg-white/50'}`}>
                <div className="text-xs font-bold text-gray-900">{opt.label}</div>
                <div className="text-[10px] text-purple-600 mt-0.5">{opt.sub}</div>
              </button>
            ))}
          </div>
          {roomMode === 'create' && (
            <div className="mt-3 flex gap-2">
              <button onClick={()=>setRoomType('public')} className={`flex-1 p-2 rounded-lg text-xs font-bold text-center ${roomType==='public' ? 'bg-purple-600 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}>{t('checkout.public')}</button>
              <button onClick={()=>setRoomType('private')} className={`flex-1 p-2 rounded-lg text-xs font-bold text-center ${roomType==='private' ? 'bg-purple-600 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}>{t('checkout.private')}</button>
            </div>
          )}
        </div>

        {/* Points earn */}
        <div className="bg-amber-50 rounded-xl p-3 flex items-center justify-between">
          <div className="text-xs text-gray-700">{t('checkout.points_earn')}</div>
          <div className="text-sm font-bold text-amber-700">+{ptsEarn} TP <span className="text-[10px] font-normal text-amber-500">({ptsLabel})</span></div>
        </div>

        {/* Payment method */}
        <div className="bg-white rounded-xl border border-gray-200 p-3">
          <div className="text-xs font-bold text-gray-700 mb-2">결제 수단</div>
          <div className="flex items-center gap-3 p-2 bg-blue-50 rounded-lg border border-blue-200">
            <I.CreditCard s={18} c="text-blue-600"/>
            <div className="text-sm font-medium text-gray-900">Touch 'n Go eWallet</div>
            <I.Check s={16} c="text-blue-600 ml-auto"/>
          </div>
        </div>

        {/* Pay button */}
        <button onClick={()=>onPay({store, items, base, serviceFee, total, role, roomType, ptsEarn})} className="w-full bg-amber-500 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-amber-600 transition text-base">
          {t('checkout.pay',{total:total.toFixed(2)})}
        </button>
      </div>
    </div>
  );
};

// ================= FIRESTORE ROOM SYSTEM (상태 머신) =================
// 상태 흐름: waiting → ready → ordering → all_paid → closing → deleted
// waiting: 인원 모집 중
// ready: 최소인원 충족, Creator "주문 활성화" 대기
// ordering: 각 멤버 개별 주문+결제 가능
// all_paid: 전원 결제 완료, 머천트에게 주문 전송됨
// closing: Joiner 모두 픽업완료+퇴장, Creator만 남음
// deleted: 방폭 완료

// Room 생성
async function createRoom(user, storeId, storeName, roomType, maxMembers, password) {
  const roomData = {
    storeId,
    storeName,
    type: roomType, // 'public' or 'private'
    creatorUid: user.uid,
    creatorName: user.displayName || 'Anonymous',
    members: [{uid: user.uid, name: user.displayName || 'Anonymous', photoURL: user.photoURL || null, role: 'creator'}],
    memberCount: 1,
    maxMembers: maxMembers || TAPIK.ROOM_MAX,
    minMembers: TAPIK.ROOM_MIN,
    status: 'waiting',
    paidMembers: [],       // 결제 완료한 멤버 uid 배열
    rewardMode: _activeRewardMode, // 생성 시점 적립률 모드 기록
    createdAt: FB.serverTimestamp(),
    expiresAt: new Date(Date.now() + TAPIK.ROOM_TIMEOUT * 60 * 1000),
  };
  if (roomType === 'private' && password) {
    roomData.password = password;
  }
  const roomRef = await FB.addDoc(FB.collection(FB.db, 'rooms'), roomData);
  return roomRef.id;
}

// Room 참여
async function joinRoom(user, roomId) {
  const roomRef = FB.doc(FB.db, 'rooms', roomId);
  const snap = await FB.getDoc(roomRef);
  if (!snap.exists()) return;
  const data = snap.data();
  // 이미 참여 중이면 무시
  if (data.members?.some(m => m.uid === user.uid)) return;
  const newMembers = [...(data.members || []), {uid: user.uid, name: user.displayName || 'Anonymous', photoURL: user.photoURL || null, role: 'joiner'}];
  const newCount = newMembers.length;
  const update = { members: newMembers, memberCount: newCount };
  // 최소인원 충족 시 자동으로 ready 전환
  if (data.status === 'waiting' && newCount >= (data.minMembers || TAPIK.ROOM_MIN)) {
    update.status = 'ready';
  }
  await FB.updateDoc(roomRef, update);
}

// Room 나가기 (Joiner만 — Creator는 방폭으로만 퇴장)
async function leaveRoom(user, roomId) {
  const roomRef = FB.doc(FB.db, 'rooms', roomId);
  const snap = await FB.getDoc(roomRef);
  if (!snap.exists()) return;
  const data = snap.data();
  // Creator는 일반 나가기 불가 (방폭만 가능)
  if (data.creatorUid === user.uid && data.status !== 'waiting') return;
  const newMembers = data.members.filter(m => m.uid !== user.uid);
  const newCount = Math.max(0, newMembers.length);
  const update = { members: newMembers, memberCount: newCount };
  // Creator가 waiting 상태에서 나가면 (Room 취소) → 삭제
  if (data.creatorUid === user.uid) {
    await FB.deleteDoc(roomRef);
    return;
  }
  // 인원이 최소인원 밑으로 떨어지면 ready → waiting
  if (newCount < (data.minMembers || TAPIK.ROOM_MIN) && data.status === 'ready') {
    update.status = 'waiting';
  }
  // all_paid 이후 Joiner가 나가면 (픽업 완료 후) → Creator만 남으면 closing
  if (['all_paid', 'closing'].includes(data.status)) {
    const remainingJoiners = newMembers.filter(m => m.uid !== data.creatorUid);
    if (remainingJoiners.length === 0) {
      update.status = 'closing';
    }
  }
  await FB.updateDoc(roomRef, update);
}

// Creator: 주문 활성화 (ready → ordering)
async function activateOrdering(roomId) {
  const roomRef = FB.doc(FB.db, 'rooms', roomId);
  await FB.updateDoc(roomRef, { status: 'ordering' });
}

// 결제 완료 기록
async function markMemberPaid(roomId, userUid) {
  const roomRef = FB.doc(FB.db, 'rooms', roomId);
  const snap = await FB.getDoc(roomRef);
  if (!snap.exists()) return;
  const data = snap.data();
  const newPaid = [...(data.paidMembers || [])];
  if (!newPaid.includes(userUid)) newPaid.push(userUid);
  const update = { paidMembers: newPaid };
  // 전원 결제 완료 체크
  if (newPaid.length >= (data.memberCount || data.members?.length || 0)) {
    update.status = 'all_paid';
  }
  await FB.updateDoc(roomRef, update);
}

// Creator 방폭 (closing → deleted)
async function destroyRoom(roomId) {
  const roomRef = FB.doc(FB.db, 'rooms', roomId);
  await FB.updateDoc(roomRef, { status: 'deleted' });
  // 잠시 후 실제 삭제 (UI에서 보이지 않도록)
  setTimeout(async () => { try { await FB.deleteDoc(roomRef); } catch(e) {} }, 2000);
}

// ROOM TAB — Firestore 실시간 + 상태 머신
const RoomTab = ({onJoin, joinedRoom, user, onCreateRoom, onLeaveRoom}) => {
  const [subTab, setSubTab] = useState('public');
  const [rooms, setRooms] = useState([]);
  const [showCreate, setShowCreate] = useState(false);
  const [createStore, setCreateStore] = useState(STORES[0]);
  const [createType, setCreateType] = useState('public');
  const [createMax, setCreateMax] = useState(TAPIK.ROOM_MAX);
  const [createPassword, setCreatePassword] = useState('');
  const [creating, setCreating] = useState(false);
  const [passwordInput, setPasswordInput] = useState('');
  const [passwordRoomId, setPasswordRoomId] = useState(null);
  const [rewardMode, setRewardMode] = useState(_activeRewardMode);

  // Firestore 실시간 리스너 — 활성 Room 목록 (모든 활성 상태)
  useEffect(() => {
    const q = FB.query(
      FB.collection(FB.db, 'rooms'),
      FB.where('status', 'in', ['waiting', 'ready', 'ordering', 'all_paid', 'closing'])
    );
    const unsub = FB.onSnapshot(q, (snap) => {
      const list = [];
      snap.forEach(d => {
        const data = d.data();
        const expiresAt = data.expiresAt?.toDate ? data.expiresAt.toDate() : new Date(data.expiresAt);
        const minutesLeft = Math.max(0, Math.round((expiresAt - Date.now()) / 60000));
        list.push({ id: d.id, ...data, minutesLeft });
      });
      setRooms(list);
    });
    return unsub;
  }, []);

  // 적립률 모드 실시간 구독
  useEffect(() => {
    const unsub = subscribeRewardMode((mode) => setRewardMode(mode));
    return unsub;
  }, []);

  // 만료 체크 — 30분 지나면 expired 처리
  useEffect(() => {
    const interval = setInterval(async () => {
      for (const room of rooms) {
        if (room.minutesLeft <= 0 && ['waiting','ready'].includes(room.status)) {
          try { await FB.updateDoc(FB.doc(FB.db, 'rooms', room.id), { status: 'expired' }); } catch(e) {}
        }
      }
    }, 30000);
    return () => clearInterval(interval);
  }, [rooms]);

  const publicRooms = rooms.filter(r => r.type === 'public');
  const privateRooms = rooms.filter(r => r.type === 'private');
  const myRoom = rooms.find(r => r.members?.some(m => m.uid === user?.uid));

  const handleCreate = async () => {
    if (!user) return;
    setCreating(true);
    try {
      const pw = createType === 'private' ? createPassword : null;
      const roomId = await createRoom(user, createStore.id, createStore.name, createType, createMax, pw);
      setShowCreate(false);
      setCreatePassword('');
      if (onCreateRoom) onCreateRoom({id: roomId, storeId: createStore.id, storeName: createStore.name, type: createType, creator: user.displayName, members: 1, max: createMax});
    } catch(e) { console.error('Room create error:', e); }
    setCreating(false);
  };

  const handleJoinRoom = async (room) => {
    if (!user) return;
    // Private Room → 비밀번호 확인
    if (room.type === 'private' && room.password) {
      setPasswordRoomId(room.id);
      setPasswordInput('');
      return;
    }
    try {
      await joinRoom(user, room.id);
      if (onJoin) onJoin({...room, storeId: room.storeId, storeName: room.storeName});
    } catch(e) { console.error('Room join error:', e); }
  };

  const handlePasswordJoin = async () => {
    const room = rooms.find(r => r.id === passwordRoomId);
    if (!room) return;
    if (passwordInput !== room.password) {
      alert(t('msg.password_wrong'));
      return;
    }
    try {
      await joinRoom(user, room.id);
      if (onJoin) onJoin({...room, storeId: room.storeId, storeName: room.storeName});
    } catch(e) { console.error('Room join error:', e); }
    setPasswordRoomId(null);
    setPasswordInput('');
  };

  const handleLeave = async () => {
    if (!user || !myRoom) return;
    try {
      await leaveRoom(user, myRoom.id);
      if (onLeaveRoom) onLeaveRoom();
    } catch(e) { console.error('Room leave error:', e); }
  };

  // Creator: 주문 활성화
  const handleActivateOrdering = async () => {
    if (!myRoom) return;
    try { await activateOrdering(myRoom.id); } catch(e) { console.error('Activate error:', e); }
  };

  // Creator: 방폭
  const handleDestroyRoom = async () => {
    if (!myRoom) return;
    try {
      await destroyRoom(myRoom.id);
      if (onLeaveRoom) onLeaveRoom();
    } catch(e) { console.error('Destroy error:', e); }
  };

  // 상태 뱃지 색상
  const statusBadge = (status) => {
    const map = {
      waiting: { bg: 'bg-yellow-100 text-yellow-700', textKey: 'room.status.waiting' },
      ready: { bg: 'bg-green-100 text-green-700', textKey: 'room.status.ready' },
      ordering: { bg: 'bg-blue-100 text-blue-700', textKey: 'room.status.ordering' },
      all_paid: { bg: 'bg-purple-100 text-purple-700', textKey: 'room.status.all_paid' },
      closing: { bg: 'bg-red-100 text-red-700', textKey: 'room.status.closing' },
    };
    const s = map[status] || map.waiting;
    return <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded-full ${s.bg}`}>{t(s.textKey)}</span>;
  };

  const FireRoomCard = ({room}) => {
    const isMine = room.members?.some(m => m.uid === user?.uid);
    const isCreator = room.creatorUid === user?.uid;
    const isPaid = (room.paidMembers || []).includes(user?.uid);
    const canOrder = room.status === 'ordering' && isMine && !isPaid;
    const canJoin = ['waiting', 'ready'].includes(room.status) && !isMine && room.memberCount < room.maxMembers;
    // Creator 나가기: waiting 상태에서만 가능 (Room 취소). 그 외에는 방폭만.
    const canLeave = isMine && !isCreator && ['waiting','ready'].includes(room.status);
    const canCancelRoom = isMine && isCreator && room.status === 'waiting';

    return (
      <div>
        <div className={`rounded-xl border p-3 shadow-sm ${isMine ? 'bg-purple-50 border-purple-300' : 'bg-white border-gray-100'}`}>
          <div className="flex items-center justify-between">
            <div className="flex-1">
              <div className="flex items-center gap-1.5 flex-wrap">
                <span className="text-xs">{room.type === 'public' ? '🌐' : '🔒'}</span>
                <span className="font-bold text-sm text-gray-900">{room.storeName}</span>
                {isMine && <span className="bg-purple-600 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full">{isCreator ? 'Creator' : 'Joiner'}</span>}
                {statusBadge(room.status)}
              </div>
              <div className="text-xs text-gray-500 mt-0.5">by {room.creatorName} · <span className="font-bold text-purple-600">{t('room.members_count', {n: room.memberCount || room.members?.length || 0, max: room.minMembers})}</span> · {t('room.time_left', {min: room.minutesLeft})}</div>
              {/* Member avatars + payment check */}
              <div className="flex items-center gap-1 mt-1.5">
                {(room.members || []).map((m, i) => {
                  const paid = (room.paidMembers || []).includes(m.uid);
                  return (
                    <div key={i} className="relative">
                      {m.photoURL ? (
                        <img src={m.photoURL} className={`w-6 h-6 rounded-full object-cover border-2 ${paid ? 'border-green-400' : 'border-white'}`} referrerPolicy="no-referrer" title={m.name}/>
                      ) : (
                        <div className={`w-6 h-6 rounded-full bg-purple-200 text-purple-700 flex items-center justify-center text-[9px] font-bold border-2 ${paid ? 'border-green-400' : 'border-white'}`} title={m.name}>{m.name?.[0]}</div>
                      )}
                      {paid && <span className="absolute -bottom-0.5 -right-0.5 text-[8px]">✅</span>}
                    </div>
                  );
                })}
                {room.memberCount >= room.minMembers && room.status === 'waiting' && <span className="text-[9px] text-green-600 font-bold ml-1">{t('room.min_met')}</span>}
              </div>
              {/* Show reward rate mode */}
              {isMine && <div className="text-[9px] text-gray-400 mt-1">{t('room.reward_rate', {mode: REWARD_MODES[rewardMode]?.name || t('reward.mode.default')})}</div>}
            </div>
            <div className="flex flex-col gap-1 items-end">
              {canJoin && (
                <button onClick={()=>handleJoinRoom(room)} className="bg-amber-500 text-white text-xs font-bold px-3 py-1.5 rounded-lg hover:bg-amber-600 transition">{t('room.join')}</button>
              )}
              {(canLeave || canCancelRoom) && (
                <button onClick={handleLeave} className="bg-gray-200 text-gray-600 text-xs font-bold px-3 py-1.5 rounded-lg">{canCancelRoom ? t('action.close_room') : t('action.leave_room')}</button>
              )}
            </div>
          </div>
        </div>

        {/* Creator: activate ordering button (ready status only) */}
        {isMine && isCreator && room.status === 'ready' && (
          <button onClick={handleActivateOrdering} className="w-full mt-1 bg-gradient-to-r from-green-500 to-green-700 text-white font-bold py-2.5 rounded-xl text-sm flex items-center justify-center gap-2 shadow-md hover:shadow-lg transition animate-pulse-ring">
            {t('room.activate_order')}
          </button>
        )}

        {/* Go to order - only active when in ordering status + not paid */}
        {isMine && room.status === 'ordering' && !isPaid && (
          <button onClick={()=>{
            const store = STORES.find(s => s.id === room.storeId);
            if (store && onJoin) onJoin({...room, storeId: room.storeId, storeName: room.storeName});
          }} className="w-full mt-1 bg-gradient-to-r from-purple-500 to-purple-700 text-white font-bold py-2.5 rounded-xl text-sm flex items-center justify-center gap-2 shadow-md hover:shadow-lg transition">
            {t('room.go_order')}
          </button>
        )}

        {/* Show payment complete status */}
        {isMine && isPaid && room.status === 'ordering' && (
          <div className="w-full mt-1 bg-green-50 border border-green-300 text-green-700 font-bold py-2.5 rounded-xl text-sm text-center">
            {t('room.paid_wait')}
          </div>
        )}

        {/* All members paid notification */}
        {isMine && room.status === 'all_paid' && (
          <div className="w-full mt-1 bg-purple-50 border border-purple-300 text-purple-700 font-bold py-2.5 rounded-xl text-sm text-center">
            {t('room.all_paid')}
          </div>
        )}

        {/* Creator room destroy button (closing status) */}
        {isMine && isCreator && room.status === 'closing' && (
          <button onClick={handleDestroyRoom} className="w-full mt-1 bg-gradient-to-r from-red-500 to-red-700 text-white font-bold py-2.5 rounded-xl text-sm flex items-center justify-center gap-2 shadow-md hover:shadow-lg transition">
            {t('room.destroy')}
          </button>
        )}

        {/* Inactive order button in waiting status */}
        {isMine && room.status === 'waiting' && (
          <div className="w-full mt-1 bg-gray-100 border border-gray-200 text-gray-400 font-bold py-2.5 rounded-xl text-sm text-center">
            {t('room.min_recruit', {min: room.minMembers})}
          </div>
        )}

        {/* Joiner waits in ready status */}
        {isMine && !isCreator && room.status === 'ready' && (
          <div className="w-full mt-1 bg-yellow-50 border border-yellow-300 text-yellow-700 font-bold py-2.5 rounded-xl text-sm text-center">
            {t('room.wait_activate')}
          </div>
        )}
      </div>
    );
  };

  return (
    <div className="pt-12 pb-4 px-4">
      <div className="flex items-center justify-between mb-3">
        <div className="font-bold text-lg text-gray-900">{t('tab.room')}</div>
        <button onClick={()=>setShowCreate(true)} className="bg-purple-600 text-white text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1"><I.Plus s={14}/> {t('room.create')}</button>
      </div>

      {/* Create room modal */}
      {showCreate && (
        <div className="bg-purple-50 border-2 border-purple-300 rounded-xl p-4 mb-4 animate-slide-up">
          <div className="text-sm font-bold text-purple-800 mb-3">{t('room.create_title')}</div>
          <div className="text-xs font-bold text-gray-700 mb-1.5">{t('room.select_store')}</div>
          <div className="flex gap-2 mb-3 overflow-x-auto hide-scroll">
            {STORES.map(s => (
              <button key={s.id} onClick={()=>setCreateStore(s)} className={`flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold border-2 transition ${createStore.id === s.id ? 'border-purple-500 bg-white text-purple-700' : 'border-gray-200 bg-white text-gray-600'}`}>{s.name}</button>
            ))}
          </div>
          <div className="text-xs font-bold text-gray-700 mb-1.5">{t('room.select_type')}</div>
          <div className="flex gap-2 mb-3">
            <button onClick={()=>{setCreateType('public'); setCreatePassword('');}} className={`flex-1 p-2 rounded-lg text-xs font-bold text-center ${createType==='public' ? 'bg-purple-600 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}>🌐 Public</button>
            <button onClick={()=>setCreateType('private')} className={`flex-1 p-2 rounded-lg text-xs font-bold text-center ${createType==='private' ? 'bg-purple-600 text-white' : 'bg-white text-gray-600 border border-gray-200'}`}>🔒 Private</button>
          </div>
          {createType === 'private' && (
            <div className="mb-3">
              <div className="text-xs font-bold text-gray-700 mb-1.5">{t('room.password_label')}</div>
              <input type="text" value={createPassword} onChange={e=>setCreatePassword(e.target.value)} placeholder={t('room.password_input')} className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-xs outline-none focus:border-purple-400"/>
            </div>
          )}
          <div className="text-xs font-bold text-gray-700 mb-1.5">{t('room.max_members', {max: createMax, min: TAPIK.ROOM_MIN})}</div>
          <input type="range" min={TAPIK.ROOM_MIN} max={TAPIK.ROOM_MAX} value={createMax} onChange={e=>setCreateMax(Number(e.target.value))} className="w-full mb-3"/>
          <div className="flex gap-2">
            <button onClick={()=>setShowCreate(false)} className="flex-1 bg-gray-200 text-gray-700 font-bold py-2.5 rounded-xl text-sm">{t('room.btn_cancel')}</button>
            <button onClick={handleCreate} disabled={creating} className="flex-1 bg-purple-600 text-white font-bold py-2.5 rounded-xl text-sm disabled:opacity-50">{creating ? t('room.btn_creating') : t('room.btn_create')}</button>
          </div>
        </div>
      )}

      {/* Password modal */}
      {passwordRoomId && (
        <div className="bg-yellow-50 border-2 border-yellow-300 rounded-xl p-4 mb-4 animate-slide-up">
          <div className="text-sm font-bold text-yellow-800 mb-2">{t('room.password_title')}</div>
          <input type="text" value={passwordInput} onChange={e=>setPasswordInput(e.target.value)} placeholder={t('room.password_input_modal')} className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-yellow-400 mb-3"/>
          <div className="flex gap-2">
            <button onClick={()=>{setPasswordRoomId(null); setPasswordInput('');}} className="flex-1 bg-gray-200 text-gray-700 font-bold py-2 rounded-xl text-sm">{t('room.btn_cancel')}</button>
            <button onClick={handlePasswordJoin} className="flex-1 bg-yellow-500 text-white font-bold py-2 rounded-xl text-sm">{t('room.btn_join')}</button>
          </div>
        </div>
      )}

      {/* Display current reward rate mode */}
      <div className="bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-lg px-3 py-2 mb-3 flex items-center justify-between">
        <span className="text-[10px] text-amber-700">{t('room.current_rate')}</span>
        <span className="text-[10px] font-bold text-amber-800">{t('room.rate_mode', {mode: REWARD_MODES[rewardMode]?.name || t('reward.mode.default')})}</span>
      </div>

      {/* Sub tabs */}
      <div className="flex gap-0 bg-gray-100 rounded-xl p-1 mb-4">
        <button onClick={()=>setSubTab('public')} className={`flex-1 py-2 rounded-lg text-xs font-bold text-center transition ${subTab==='public' ? 'bg-white text-purple-700 shadow-sm' : 'text-gray-500'}`}>🌐 Public ({publicRooms.length})</button>
        <button onClick={()=>setSubTab('private')} className={`flex-1 py-2 rounded-lg text-xs font-bold text-center transition ${subTab==='private' ? 'bg-white text-purple-700 shadow-sm' : 'text-gray-500'}`}>🔒 Private ({privateRooms.length})</button>
      </div>

      {subTab === 'public' ? (
        <div>
          <div className="text-xs font-bold text-gray-700 mb-2">{t('room.find')}</div>
          {publicRooms.length === 0 ? (
            <div className="text-center text-gray-400 text-sm mt-8 py-8">
              <div className="text-3xl mb-2">🚪</div>
              <div>{t('room.no_public')}</div>
              <div className="text-[10px] mt-1">{t('room.create_new')}</div>
            </div>
          ) : (
            <div className="space-y-2">
              {publicRooms.map(r => <FireRoomCard key={r.id} room={r}/>)}
            </div>
          )}
        </div>
      ) : (
        <div>
          <div className="text-xs font-bold text-gray-700 mb-2">{t('room.friend_rooms')}</div>
          {privateRooms.length === 0 ? (
            <div className="text-center text-gray-400 text-sm mt-8 py-8">
              <div className="text-3xl mb-2">🔒</div>
              <div>{t('room.no_private')}</div>
            </div>
          ) : (
            <div className="space-y-2">
              {privateRooms.map(r => <FireRoomCard key={r.id} room={r}/>)}
            </div>
          )}
        </div>
      )}
    </div>
  );
};

        </div>

          <div className="mt-2 bg-white/20 rounded-lg px-3 py-1.5 text-[11px] font-bold text-center">

            <div key={storeId} className="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
              <div className="text-sm text-gray-700">{store.name}</div>
              <div className="text-sm font-bold text-amber-600">{pts} TP</div>

      <div className="bg-white rounded-xl border border-gray-100 p-3">
        <div className="text-xs font-bold text-gray-700 mb-2">{t('rewards.shop')}</div>
        {REWARDS_CATALOG.map(r => (

// ONBOARDING — 7단계: Splash → 3 Value Slides → Phone OTP → Profile → Permissions → Terms → Home
const OnboardingScreen = ({onComplete}) => {
  const [step, setStep] = useState(0); // 0=splash, 1-3=value, 4=phone, 5=profile, 6=perms, 7=terms
  const [phone, setPhone] = useState('');
  const [otp, setOtp] = useState('');
  const [otpSent, setOtpSent] = useState(false);
  const [name, setName] = useState('');
  const [perms, setPerms] = useState({location:false, contacts:false, push:false});
  const [termsOk, setTermsOk] = useState(false);

  // Step 0: Splash
  if (step === 0) return (
    <div className="min-h-full bg-gradient-to-br from-amber-400 to-orange-500 flex flex-col items-center justify-center px-8">
      <div className="animate-pop"><TapikLogo size={56}/></div>
      <div className="text-white text-xl font-bold mt-6 animate-fade">{t('onboarding.welcome')}</div>
      <div className="text-white/70 text-sm mt-2 text-center">{t('onboarding.tagline')}</div>
      <button onClick={()=>setStep(1)} className="w-full bg-white text-gray-900 font-bold py-3.5 rounded-xl shadow mt-12">{t('onboarding.start')}</button>
      <button onClick={onComplete} className="w-full text-white/60 text-xs py-3 mt-2">{t('onboarding.skip_all')}</button>
    </div>
  );

  // Steps 1-3: Value slides
  if (step >= 1 && step <= 3) {
    const idx = step - 1;
    const slides = [t('onboarding.slide1'), t('onboarding.slide2'), t('onboarding.slide3')];
    const descs = [t('phrase.no_queue'), t('phrase.earn_points'), t('phrase.room_bonus')];
    const colors = ['from-amber-400 to-orange-500', 'from-green-400 to-emerald-500', 'from-purple-400 to-indigo-500'];
    const icons = [I.Clock, I.Gift, I.Users];
    const Ico = icons[idx];
    return (
      <div className={`min-h-full bg-gradient-to-br ${colors[idx]} flex flex-col items-center justify-center px-8 text-white`}>
        <div className="animate-pop">
          <div className="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center mb-6 mx-auto"><Ico s={48} c="text-white" sw={1.5}/></div>
          <div className="text-2xl font-bold text-center">{slides[idx]}</div>
          <div className="text-sm text-white/70 text-center mt-3">{descs[idx]}</div>
        </div>
        <div className="flex gap-2 mt-8">
          {[0,1,2].map(i => <div key={i} className={`w-2 h-2 rounded-full ${i===idx?'bg-white':'bg-white/40'}`}/>)}
        </div>
        <div className="mt-12 w-full space-y-3">
          <button onClick={()=>setStep(step+1)} className="w-full bg-white text-gray-900 font-bold py-3.5 rounded-xl shadow">
            {step < 3 ? t('onboarding.next') : t('onboarding.start')}
          </button>
          <button onClick={()=>setStep(4)} className="w-full text-white/70 text-sm py-2">{t('onboarding.skip')}</button>
        </div>
      </div>
    );
  }

  // Step 4: Phone OTP
  if (step === 4) return (
    <div className="min-h-full bg-white px-6 pt-16">
      <div className="text-center mb-8">
        <div className="text-2xl font-bold text-gray-900">{t('onboarding.phone_title')}</div>
        <div className="text-sm text-gray-500 mt-2">{t('onboarding.phone_desc')}</div>
      </div>
      <div className="flex items-center gap-2 bg-gray-100 rounded-xl p-3 mb-3">
        <span className="text-sm font-bold text-gray-600">🇲🇾 +60</span>
        <input value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,''))} placeholder="12-345 6789" className="bg-transparent flex-1 outline-none text-sm text-gray-900" maxLength={11}/>
      </div>
      {!otpSent ? (
        <button onClick={()=>{ if(phone.length>=9) setOtpSent(true); }} className={`w-full py-3.5 rounded-xl font-bold text-sm ${phone.length>=9 ? 'bg-amber-500 text-white' : 'bg-gray-200 text-gray-400'}`}>
          {t('onboarding.send_code')}
        </button>
      ) : (
        <div className="space-y-3">
          <div className="text-center text-xs text-green-600 font-bold animate-fade">{t('onboarding.code_sent', {phone})}</div>
          <div className="flex gap-2 justify-center">
            {[0,1,2,3,4,5].map(i => (
              <input key={i} value={otp[i]||''} onChange={e => {
                const v = e.target.value.replace(/\D/g,'');
                if (v) { const newOtp = otp.slice(0,i) + v[0] + otp.slice(i+1); setOtp(newOtp); if(i<5) e.target.nextSibling?.focus(); }
              }} className="w-10 h-12 text-center text-lg font-bold border-2 border-gray-200 rounded-lg focus:border-amber-500 outline-none" maxLength={1}/>
            ))}
          </div>
          <button onClick={()=>{ if(otp.length>=6) setStep(5); }} className={`w-full py-3.5 rounded-xl font-bold text-sm ${otp.length>=6 ? 'bg-amber-500 text-white' : 'bg-gray-200 text-gray-400'}`}>
            {t('onboarding.verify_code')}
          </button>
          <button onClick={()=>{setOtp(''); setOtpSent(false);}} className="w-full text-gray-400 text-xs py-2">{t('onboarding.resend')}</button>
        </div>
      )}
      <button onClick={onComplete} className="text-gray-300 text-[10px] mt-8">{t('onboarding.skip_perm')}</button>
    </div>
  );

  // Step 5: Profile
  if (step === 5) return (
    <div className="min-h-full bg-white px-6 pt-16">
      <div className="text-center mb-8">
        <div className="w-20 h-20 bg-gradient-to-br from-amber-400 to-orange-500 rounded-full flex items-center justify-center mx-auto mb-4">
          <I.User s={36} c="text-white"/>
        </div>
        <div className="text-2xl font-bold text-gray-900">{t('onboarding.profile_title')}</div>
      </div>
      <div className="space-y-3">
        <div>
          <label className="text-xs font-bold text-gray-600 block mb-1">{t('onboarding.name_label')}</label>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder={t('onboarding.name_input')} className="w-full bg-gray-100 rounded-xl p-3 outline-none text-sm focus:ring-2 ring-amber-300"/>
        </div>
        <div className="bg-gray-50 rounded-xl p-3">
          <div className="text-xs text-gray-500">{t('onboarding.phone_label')}</div>
          <div className="text-sm font-bold text-gray-900 mt-0.5">+60 {phone}</div>
        </div>
      </div>
      <button onClick={()=>{ if(name.trim()) setStep(6); }} className={`w-full py-3.5 rounded-xl font-bold text-sm mt-8 ${name.trim() ? 'bg-amber-500 text-white' : 'bg-gray-200 text-gray-400'}`}>
        {t('onboarding.next')}
      </button>
      <button onClick={onComplete} className="w-full text-gray-300 text-[10px] mt-3">{t('onboarding.skip_perm')}</button>
    </div>
  );

  // Step 6: Permissions
  if (step === 6) return (
    <div className="min-h-full bg-white px-6 pt-16">
      <div className="text-center mb-6">
        <div className="text-2xl font-bold text-gray-900">{t('phrase.permissions')}</div>
        <div className="text-sm text-gray-500 mt-2">{t('phrase.permissions_desc')}</div>
      </div>
      <div className="space-y-3">
        {[
          {key:'location', icon:I.MapPin, labelKey:'phrase.location', descKey:'phrase.location_desc', required:true},
          {key:'contacts', icon:I.Users, labelKey:'phrase.contact', descKey:'phrase.contact_desc', required:false},
          {key:'push', icon:I.Bell, labelKey:'phrase.notifications', descKey:'phrase.notifications_desc', required:false},
        ].map(p => (
          <div key={p.key} className={`flex items-center gap-3 p-3 rounded-xl border-2 cursor-pointer transition ${perms[p.key] ? 'border-amber-400 bg-amber-50' : 'border-gray-200'}`} onClick={()=>setPerms({...perms, [p.key]:!perms[p.key]})}>
            <div className={`w-10 h-10 rounded-full flex items-center justify-center ${perms[p.key] ? 'bg-amber-500' : 'bg-gray-200'}`}>
              <p.icon s={18} c={perms[p.key] ? 'text-white' : 'text-gray-500'}/>
            </div>
            <div className="flex-1">
              <div className="text-sm font-bold text-gray-900">{t(p.labelKey)} {p.required && <span className="text-red-500 text-[10px]">Required</span>}</div>
              <div className="text-[10px] text-gray-500 mt-0.5">{t(p.descKey)}</div>
            </div>
            <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${perms[p.key] ? 'border-amber-500 bg-amber-500' : 'border-gray-300'}`}>
              {perms[p.key] && <I.Check s={12} c="text-white"/>}
            </div>
          </div>
        ))}
      </div>
      <button onClick={()=>setStep(7)} className={`w-full py-3.5 rounded-xl font-bold text-sm mt-8 ${perms.location ? 'bg-amber-500 text-white' : 'bg-gray-200 text-gray-400'}`}>
        {perms.location ? t('action.next') : t('msg.no_location')}
      </button>
      <button onClick={()=>{setPerms({location:true,contacts:false,push:false}); setStep(7);}} className="w-full text-gray-400 text-xs py-2">Skip with minimum permissions</button>
      <button onClick={onComplete} className="w-full text-gray-300 text-[10px] mt-1">⚡ {t('action.skip')}</button>
    </div>
  );

  // Step 7: Terms & Privacy
  if (step === 7) return (
    <div className="min-h-full bg-white px-6 pt-16">
      <div className="text-center mb-6">
        <div className="text-2xl font-bold text-gray-900">Terms & Privacy</div>
      </div>
      <div className="space-y-2 text-xs text-gray-600 bg-gray-50 rounded-xl p-4 max-h-60 overflow-y-auto hide-scroll">
        <div className="font-bold text-gray-900 mb-2">{t('onboarding.terms_title')}</div>
        <div>• <b>{t('label.terms_location')}:</b> {t('onboarding.terms_location')}</div>
        <div>• <b>{t('label.terms_contact')}:</b> {t('onboarding.terms_contact')}</div>
        <div>• <b>{t('label.terms_payment')}:</b> {t('onboarding.terms_payment')}</div>
        <div>• <b>{t('label.terms_points')}:</b> {t('onboarding.terms_points')}</div>
        <div>• <b>{t('label.terms_cancel')}:</b> {t('onboarding.terms_cancel')}</div>
        <div>• <b>Room:</b> {t('onboarding.terms_room')}</div>
        <div>• <b>{t('label.terms_privacy')}:</b> {t('onboarding.terms_privacy')}</div>
      </div>
      <div className={`flex items-center gap-3 mt-4 p-3 rounded-xl border-2 cursor-pointer transition ${termsOk ? 'border-amber-400 bg-amber-50' : 'border-gray-200'}`} onClick={()=>setTermsOk(!termsOk)}>
        <div className={`w-5 h-5 rounded flex items-center justify-center border-2 ${termsOk ? 'border-amber-500 bg-amber-500' : 'border-gray-300'}`}>
          {termsOk && <I.Check s={12} c="text-white"/>}
        </div>
        <div className="text-sm text-gray-700">{t('onboarding.agree_all')}</div>
      </div>
      <button onClick={()=>{ if(termsOk) onComplete(); }} className={`w-full py-3.5 rounded-xl font-bold text-sm mt-6 ${termsOk ? 'bg-amber-500 text-white' : 'bg-gray-200 text-gray-400'}`}>
        {t('onboarding.start_app')}
      </button>
      <button onClick={onComplete} className="w-full text-gray-300 text-[10px] mt-2">{t('onboarding.skip_perm')}</button>
    </div>
  );

  return null;
};

function ConsumerApp() {
  const [firebaseUser, setFirebaseUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  // Firebase Auth 상태 감시
  useEffect(() => {
    const unsub = FB.onAuthStateChanged(FB.auth, (user) => {
      setFirebaseUser(user);
      setAuthLoading(false);
    });
    return unsub;
  }, []);

  // 로그아웃
  const handleLogout = () => FB.signOut(FB.auth);

  if (authLoading) {
    return (
      <div className="min-h-screen bg-gray-100 flex items-center justify-center">
        <div className="text-center">
          <TapikLogo size={40}/>
          <div className="mt-4 text-sm text-gray-500">{t('msg.loading')}</div>
        </div>
      </div>
    );
  }

  if (!firebaseUser) {
    return <LoginScreen onLogin={(u) => setFirebaseUser(u)}/>;
  }

  return <ConsumerAppInner user={firebaseUser} onLogout={handleLogout}/>;
}

function ConsumerAppInner({user, onLogout}) {
  const [screen, setScreen] = useState('onboarding'); // onboarding, home, store, checkout, prepaid, status
  const [tab, setTab] = useState('home');
  const [selectedStore, setSelectedStore] = useState(null);
  const [merchantOnline, setMerchantOnline] = useState(null); // 연동된 머천트 매장명

  // ===== 포인트 시스템 (Firestore 연동) =====
  const [userPoints, setUserPoints] = useState({ total: 0, byStore: {} });
  const [pointsLoaded, setPointsLoaded] = useState(false);

  // Firestore에서 유저 포인트 로드
  useEffect(() => {
    if (!user?.uid) return;
    const unsub = FB.onSnapshot(FB.doc(FB.db, 'users', user.uid), (snap) => {
      if (snap.exists()) {
        const data = snap.data();
        setUserPoints({
          total: data.totalPoints || 0,
          byStore: data.pointsByStore || {},
        });
      }
      setPointsLoaded(true);
    });
    return unsub;
  }, [user?.uid]);

  // 포인트 적립 함수 — PICKED_UP 시 호출
  const creditPoints = async (ptsTP, storeId) => {
    if (!user?.uid || !ptsTP || ptsTP <= 0) return;
    // 로컬 상태 즉시 업데이트
    setUserPoints(prev => ({
      total: prev.total + ptsTP,
      byStore: { ...prev.byStore, [storeId]: (prev.byStore[storeId] || 0) + ptsTP },
    }));
    // Firestore에 저장
    try {
      const userRef = FB.doc(FB.db, 'users', user.uid);
      const snap = await FB.getDoc(userRef);
      if (snap.exists()) {
        const data = snap.data();
        const newTotal = (data.totalPoints || 0) + ptsTP;
        const newByStore = { ...(data.pointsByStore || {}), [storeId]: ((data.pointsByStore || {})[storeId] || 0) + ptsTP };
        await FB.updateDoc(userRef, { totalPoints: newTotal, pointsByStore: newByStore, lastEarnedAt: FB.serverTimestamp() });
      } else {
        await FB.setDoc(userRef, {
          uid: user.uid,
          name: user.displayName || '',
          email: user.email || '',
          totalPoints: ptsTP,
          pointsByStore: { [storeId]: ptsTP },
          createdAt: FB.serverTimestamp(),
          lastEarnedAt: FB.serverTimestamp(),
        });
      }
    } catch(e) { console.error('Credit points error:', e); }
  };

  // ===== 매장별 실시간 대기열 (Firestore 주문 기반) =====
  const [storeQueues, setStoreQueues] = useState({}); // { storeId: { ahead: n, waitMin: [lo, hi] } }
  const PREP_TIME_MIN = 10; // 1인당 최소 처리시간(분)
  const PREP_TIME_MAX = 12; // 1인당 최대 처리시간(분)
  const PARALLEL_CAPACITY = 3; // 동시 처리 가능 주문 수 (30석 기준)

  useEffect(() => {
    // 활성 주문(ORDERED + PREPARING)을 실시간 구독
    const q = FB.query(
      FB.collection(FB.db, 'orders'),
      FB.where('status', 'in', ['ORDERED', 'PREPARING'])
    );
    const unsub = FB.onSnapshot(q, (snap) => {
      const counts = {};
      snap.forEach(d => {
        const data = d.data();
        const sid = data.storeId || data.store?.id;
        if (sid) counts[sid] = (counts[sid] || 0) + 1;
      });
      // 대기 시간 계산: ceil(대기인원 / 동시처리) × 처리시간
      const queues = {};
      STORES.forEach(s => {
        const ahead = counts[s.id] || 0;
        const batches = Math.ceil(ahead / PARALLEL_CAPACITY) || 0;
        queues[s.id] = {
          ahead,
          waitMin: ahead === 0 ? [0, 0] : [batches * PREP_TIME_MIN, batches * PREP_TIME_MAX],
        };
      });
      setStoreQueues(queues);
    });
    return unsub;
  }, []);

  // BroadcastChannel: Merchant 연동 상태 감지
  useEffect(() => {
    tapikChannel.postMessage({ type: 'consumer.online' });
    const handler = (e) => {
      if (e.data.type === 'merchant.online') {
        setMerchantOnline(e.data.storeName || t('phrase.store'));
      }
    };
    tapikChannel.addEventListener('message', handler);
    return () => tapikChannel.removeEventListener('message', handler);
  }, []);
  const [cartData, setCartData] = useState(null);
  const [currentOrder, setCurrentOrder] = useState(null);
  const [joinedRoom, setJoinedRoom] = useState(null);

  // Firestore: 내가 참여 중인 Room 실시간 감지
  useEffect(() => {
    if (!user?.uid) return;
    const q = FB.query(
      FB.collection(FB.db, 'rooms'),
      FB.where('status', 'in', ['waiting', 'ready', 'ordering', 'all_paid', 'closing'])
    );
    const unsub = FB.onSnapshot(q, (snap) => {
      let found = null;
      snap.forEach(d => {
        const data = d.data();
        if (data.members?.some(m => m.uid === user.uid)) {
          found = { id: d.id, ...data };
        }
      });
      setJoinedRoom(found);
    });
    return unsub;
  }, [user?.uid]);
  const [orderHistory, setOrderHistory] = useState([
    {store:STORES[0], items:[{id:'iflat',name:'Iced Flat White',basePrice:14,qty:1}], total:14.70, status:'PICKED_UP', ptsEarn:70, role:'solo', date:t('order.date_today'), reviewDone:true, reviewStars:5, id:'ORD-H001'},
    {store:STORES[1], items:[{id:'kaya',name:'Kaya Toast Set',basePrice:8,qty:1}], total:8.40, status:'PICKED_UP', ptsEarn:48, role:'solo', date:t('order.date_yesterday'), reviewDone:false, id:'ORD-H002'},
  ]);
  const [activeOrderId, setActiveOrderId] = useState(null);
  const [liveStatus, setLiveStatus] = useState(null);

  // BroadcastChannel: 머천트에서 오는 상태 변경 수신
  useEffect(() => {
    const handler = (e) => {
      const { type, orderId } = e.data;
      if (!orderId || orderId !== activeOrderId) return;
      let newStatus = null;
      if (type === 'order.accepted') newStatus = 'PREPARING';
      else if (type === 'order.ready') newStatus = 'READY';
      else if (type === 'order.pickedUp') newStatus = 'PICKED_UP';
      if (newStatus) {
        setLiveStatus(newStatus);
        setOrderHistory(prev => prev.map(o => o.id === orderId ? {...o, status: newStatus, reviewDone: false} : o));
        // 픽업 완료 → 포인트 적립!
        if (newStatus === 'PICKED_UP' && currentOrder) {
          const pts = currentOrder.ptsEarn || 0;
          const sid = currentOrder.store?.id || currentOrder.storeId;
          if (pts > 0 && sid) creditPoints(pts, sid);
        }
      }
    };
    tapikChannel.addEventListener('message', handler);
    return () => tapikChannel.removeEventListener('message', handler);
  }, [activeOrderId, currentOrder]);

  // Firestore: 주문 상태 실시간 감시 + 픽업 자동 퇴장 + 포인트 적립
  const creditedOrdersRef = useRef(new Set());
  useEffect(() => {
    if (!activeOrderId) return;
    const unsub = FB.onSnapshot(FB.doc(FB.db, 'orders', activeOrderId), async (snap) => {
      if (snap.exists()) {
        const data = snap.data();
        if (data.status && data.status !== liveStatus) {
          setLiveStatus(data.status);
          setOrderHistory(prev => prev.map(o => o.id === activeOrderId ? {...o, status: data.status, reviewDone: false} : o));
          // 픽업 완료 → 포인트 적립 + 자동 Room 퇴장
          if (data.status === 'PICKED_UP') {
            // 포인트 적립 (중복 방지)
            if (!creditedOrdersRef.current.has(activeOrderId) && currentOrder) {
              creditedOrdersRef.current.add(activeOrderId);
              const pts = currentOrder.ptsEarn || 0;
              const sid = currentOrder.store?.id || currentOrder.storeId;
              if (pts > 0 && sid) creditPoints(pts, sid);
            }
            // 자동 Room 퇴장 (Joiner만)
            if (joinedRoom && joinedRoom.id) {
              const isCreator = joinedRoom.creatorUid === user?.uid;
              if (!isCreator) {
                try {
                  await leaveRoom(user, joinedRoom.id);
                  setJoinedRoom(null);
                } catch(e) { console.error('Auto-leave error:', e); }
              }
            }
          }
        }
      }
    });
    return unsub;
  }, [activeOrderId, joinedRoom, currentOrder]);

  const handleStoreClick = (store) => { setSelectedStore(store); setScreen('store'); };
  const handleCheckout = (store, cart) => { setCartData({store, cart}); setScreen('checkout'); };
  const handlePay = (order) => { setCurrentOrder(order); setScreen('prepaid'); };
  const handlePlaceOrder = async () => {
    if (currentOrder) {
      const oid = 'ORD-' + String(Date.now()).slice(-6);
      setActiveOrderId(oid);
      setLiveStatus('ORDERED');
      const customerName = user?.displayName || t('msg.myself');
      // Room 정보 포함
      const roomInfo = joinedRoom ? {
        roomId: joinedRoom.id,
        role: joinedRoom.creatorUid === user?.uid ? 'creator' : 'joiner',
        memberCount: joinedRoom.memberCount || joinedRoom.members?.length || 1,
        rewardMode: _activeRewardMode,
      } : null;
      const orderData = {
        ...currentOrder,
        id: oid,
        status: 'ORDERED',
        date: t('msg.just_now'),
        customerName,
        customerUid: user?.uid,
        customerPhoto: user?.photoURL || null,
        storeName: currentOrder.store.name,
        storeId: currentOrder.store.id,
        roomInfo,
      };
      // Firestore에 주문 저장
      try {
        await FB.setDoc(FB.doc(FB.db, 'orders', oid), {
          ...orderData,
          store: {id: currentOrder.store.id, name: currentOrder.store.name},
          items: currentOrder.items,
          roomInfo,
          createdAt: FB.serverTimestamp(),
        });
      } catch(e) { console.error('Order save error:', e); }
      // Room 결제 완료 기록
      if (joinedRoom && joinedRoom.id) {
        try { await markMemberPaid(joinedRoom.id, user.uid); } catch(e) { console.error('markPaid error:', e); }
      }
      // BroadcastChannel도 유지 (같은 브라우저 fallback)
      tapikChannel.postMessage({ type: 'order.placed', order: orderData });
      setOrderHistory(prev => [orderData, ...prev]);
    }
    setScreen('status');
  };
  // 선결제 후 "나중에 주문" — PAID 상태로 주문 탭에 저장
  const [orderTabSeg, setOrderTabSeg] = useState('active');
  const handleSaveLater = () => {
    if (currentOrder) {
      setOrderHistory(prev => [{...currentOrder, status:'PAID', date:t('msg.just_paid'), id:'PAY-'+Date.now()}, ...prev]);
    }
    setOrderTabSeg('paid');
    setScreen('home'); setTab('order'); setCurrentOrder(null);
  };
  // 주문 탭에서 PAID 주문을 매장에 전송
  const handleSendPaidOrder = async (paidOrder) => {
    const oid = 'ORD-' + String(Date.now()).slice(-6);
    setActiveOrderId(oid);
    setLiveStatus('ORDERED');
    const customerName = user?.displayName || '나';
    const orderData = {
      ...paidOrder,
      id: oid,
      status: 'ORDERED',
      date: '방금',
      customerName,
      customerUid: user?.uid,
      customerPhoto: user?.photoURL || null,
      storeName: paidOrder.store.name,
      storeId: paidOrder.store.id,
    };
    try {
      await FB.setDoc(FB.doc(FB.db, 'orders', oid), {
        ...orderData,
        store: {id: paidOrder.store.id, name: paidOrder.store.name},
        items: paidOrder.items,
        createdAt: FB.serverTimestamp(),
      });
    } catch(e) { console.error('Order save error:', e); }
    tapikChannel.postMessage({ type: 'order.placed', order: orderData });
    setOrderHistory(prev => prev.map(o => o.id === paidOrder.id ? orderData : o));
    setCurrentOrder(paidOrder);
    setScreen('status');
  };
  // 리뷰 작성 완료
  const handleReview = (orderId, stars, text) => {
    setOrderHistory(prev => prev.map(o => o.id === orderId ? {...o, reviewDone:true, reviewStars:stars, reviewText:text} : o));
  };
  const handleHome = () => { setScreen('home'); setTab('home'); setCurrentOrder(null); };
  const handleBack = () => {
    if (screen === 'checkout') setScreen('store');
    else if (screen === 'store') { setScreen('home'); setSelectedStore(null); }
    else handleHome();
  };
  const handleRoomJoin = (room) => {
    setJoinedRoom(room);
    const store = STORES.find(s => s.id === room.storeId);
    if (store) { setSelectedStore(store); setScreen('store'); }
  };

  return (
    <div className="min-h-screen bg-gray-100 flex items-start justify-center py-6">
      <div className="phone-frame">
        <div className="phone-screen hide-scroll" style={{display:'flex', flexDirection:'column'}}>
          <div style={{flex:1, overflowY:'auto', overflowX:'hidden'}} className="hide-scroll">
            {screen === 'onboarding' && <OnboardingScreen onComplete={()=>setScreen('home')}/>}

            {screen === 'home' && tab === 'home' && <HomeScreen onStoreClick={handleStoreClick} onRoomJoin={handleRoomJoin} merchantOnline={merchantOnline} user={user} userPoints={userPoints} storeQueues={storeQueues} joinedRoom={joinedRoom} orderHistory={orderHistory} liveOrder={activeOrderId && liveStatus && !['PICKED_UP','CANCELLED'].includes(liveStatus) ? {id: activeOrderId, status: liveStatus, order: currentOrder} : null} onOrderClick={()=>{ if(currentOrder) setScreen('status'); }} onReorder={(store)=>{ setSelectedStore(store); setScreen('store'); }}/>}
            {screen === 'home' && tab === 'order' && <OrderTab orders={orderHistory} onOrderClick={(o)=>{ setCurrentOrder(o); setScreen('status'); }} onSendPaidOrder={handleSendPaidOrder} onReview={handleReview} initialSeg={orderTabSeg}/>}
            {screen === 'home' && tab === 'room' && <RoomTab onJoin={handleRoomJoin} joinedRoom={joinedRoom} user={user} onCreateRoom={(r)=>setJoinedRoom(r)} onLeaveRoom={()=>setJoinedRoom(null)}/>}
            {screen === 'home' && tab === 'rewards' && <RewardsTab userPoints={userPoints}/>}
            {screen === 'home' && tab === 'me' && <MeTab user={user} onLogout={onLogout} userPoints={userPoints}/>}

            {screen === 'store' && selectedStore && <StoreDetail store={selectedStore} onBack={handleBack} onCheckout={handleCheckout} joinedRoom={joinedRoom} queue={storeQueues?.[selectedStore.id]}/>}
            {screen === 'checkout' && cartData && <CheckoutScreen store={cartData.store} cart={cartData.cart} onBack={handleBack} onPay={handlePay} joinedRoom={joinedRoom}/>}
            {screen === 'prepaid' && currentOrder && <PrepaidScreen order={currentOrder} onPlaceOrder={handlePlaceOrder} onSaveLater={handleSaveLater} onCancel={handleHome}/>}
            {screen === 'status' && currentOrder && <OrderStatusScreen order={currentOrder} onBack={()=>{ setScreen('home'); setTab('order'); }} onHome={handleHome} liveStatus={liveStatus} orderId={activeOrderId}/>}
          </div>

          {screen === 'home' && <TabBar tab={tab} setTab={setTab}/>}
        </div>
        <div className="android-nav"><div className="android-nav-pill"/></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ConsumerApp/>);
</script>
</body>
</html>
