<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapik — Assignment Submission v6</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container { text-align: center; max-width: 520px; padding: 40px 24px; }
  .logo { font-size: 52px; font-weight: 800; color: #fbbf24; margin-bottom: 8px; letter-spacing: -1px; }
  .tagline { font-size: 13px; color: #94a3b8; margin-bottom: 48px; line-height: 1.6; }
  .buttons { display: flex; gap: 20px; justify-content: center; }
  .btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 210px; height: 130px; background: #1e293b; border: 2px solid #334155;
    border-radius: 16px; text-decoration: none; color: #e2e8f0;
    transition: all 0.2s ease; cursor: pointer;
  }
  .btn:hover {
    border-color: #fbbf24; transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(251, 191, 36, 0.12);
  }
  .btn-flag { font-size: 40px; margin-bottom: 12px; }
  .btn-text { font-size: 16px; font-weight: 700; color: #f8fafc; }
  .btn-sub { font-size: 11px; color: #94a3b8; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Tapik</div>
  <div class="tagline">Tablet-Based Independent F&B Customer Retention Platform<br>Assignment Submission v6</div>
  <div class="buttons">
    <a href="home_ko.html" class="btn">
      <div class="btn-flag">🇰🇷</div>
      <div class="btn-text">한국어</div>
      <div class="btn-sub">Korean</div>
    </a>
    <a href="home_en.html" class="btn">
      <div class="btn-flag">🇬🇧</div>
      <div class="btn-text">English</div>
      <div class="btn-sub">English</div>
    </a>
  </div>
</div>
</body>
</html>
