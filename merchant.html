let _currentLang = localStorage.getItem('tapik_lang') || 'en';
const t = (key, params = {}) => {
  let str = LANG[_currentLang]?.[key] || LANG['en'][key] || key;
  Object.entries(params).forEach(([k, v]) => { str = str.replace(`{${k}}`, v); });
  return str;
};
const setLang = (lang) => {
  _currentLang = lang;
  localStorage.setItem('tapik_lang', lang);
  try { tapikChannel.postMessage({ type: 'LANG_CHANGE', lang }); } catch(e) {}
};

// BroadcastChannel listener for LANG_CHANGE from other apps
tapikChannel.addEventListener('message', (e) => {
  if (e.data.type === 'LANG_CHANGE') {
    _currentLang = e.data.lang;
    localStorage.setItem('tapik_lang', e.data.lang);
    window.location.reload();
  }
});

// ================= Order Queue (Kanban) =================
const OrderCard = ({order, onAccept, onReject, onReady, onPickup, onManualPickup}) => {
  const statusColors = {
    ORDERED: 'border-l-blue-500 bg-blue-50',
    PREPARING: 'border-l-amber-500 bg-amber-50',
    READY: 'border-l-green-500 bg-green-50',
  };
  const isOverdue = order.status === 'PREPARING' && order.elapsed > (order.eta || 10);

  return (
    <div className={`border-l-4 ${statusColors[order.status]} rounded-lg p-3 mb-2 animate-pop shadow-sm`}>
      {/* Header */}
      <div className="flex items-center justify-between mb-2">
        <div className="flex items-center gap-2">
          <span className="font-mono font-bold text-base text-gray-900">#{order.id}</span>
          {order.isLive && <span className="bg-green-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded">{t('badge.liveOrder')}</span>}
          {order.isNew && !order.isLive && <span className="bg-blue-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded">{t('badge.firstVisit')}</span>}
          {order.room && <span className="bg-purple-100 text-purple-700 text-[9px] font-bold px-1.5 py-0.5 rounded">{t('badge.room')} {order.room}</span>}
        </div>
        <span className="text-xs text-gray-400 tabular">{order.time} · {t('time.minutesAgo', {m: order.elapsed})}</span>
      </div>

      {/* Customer */}
      <div className="text-sm font-medium text-gray-700 mb-1.5">{order.customer}</div>

      {/* Items */}
      <div className="space-y-0.5 mb-2">
        {order.items.map((item, i) => (
          <div key={i} className="flex items-center justify-between text-sm">
            <div className="flex items-center gap-2">
              {order.status === 'PREPARING' && (
                <input type="checkbox" defaultChecked={order.checklist?.[i]} className="w-4 h-4 rounded border-gray-300 text-amber-500 focus:ring-amber-400"/>
              )}
              <span className="text-gray-600">{item.name} × {item.qty}</span>
            </div>
            <span className="text-gray-500 tabular">RM {(item.price * item.qty).toFixed(2)}</span>
          </div>
        ))}
      </div>

      {/* Total */}
      <div className="flex items-center justify-between border-t border-gray-200 pt-2">
        <span className="font-bold text-gray-900 tabular">RM {order.total.toFixed(2)}</span>

        {/* Action buttons */}
        {order.status === 'ORDERED' && (
          <div className="flex gap-2">
            <button onClick={()=>onReject(order.id)} className="px-3 py-1.5 bg-red-100 text-red-600 text-xs font-bold rounded-lg hover:bg-red-200 transition">{t('btn.reject')}</button>
            <button onClick={()=>onAccept(order.id)} className="px-4 py-1.5 bg-green-500 text-white text-sm font-bold rounded-lg hover:bg-green-600 transition shadow-sm">{t('btn.accept')}</button>
          </div>
        )}
        {order.status === 'PREPARING' && (
          <div className="flex items-center gap-2">
            {isOverdue && <span className="text-[10px] text-red-500 font-bold">{t('status.overdue')}</span>}
            <button onClick={()=>onReady(order.id)} className="px-4 py-1.5 bg-amber-500 text-white text-sm font-bold rounded-lg hover:bg-amber-600 transition shadow-sm">{t('btn.ready')}</button>
          </div>
        )}
        {order.status === 'READY' && (
          <div className="flex gap-2">
            <button onClick={()=>onManualPickup(order.id)} className="px-3 py-1.5 bg-gray-200 text-gray-600 text-xs font-bold rounded-lg hover:bg-gray-300 transition">{t('btn.manualCheck')}</button>
            <button onClick={()=>onPickup(order.id)} className="px-4 py-1.5 bg-green-600 text-white text-sm font-bold rounded-lg hover:bg-green-700 transition shadow-sm flex items-center gap-1"><I.Qr s={16} c="text-white"/> {t('btn.qrScan')}</button>
          </div>
        )}
      </div>
    </div>
  );
};

const OrderQueue = ({orders, onAccept, onReject, onReady, onPickup, onManualPickup}) => {
  const ordered = orders.filter(o => o.status === 'ORDERED').sort((a,b) => (b.elapsed||0) - (a.elapsed||0));
  const preparing = orders.filter(o => o.status === 'PREPARING').sort((a,b) => (b.elapsed||0) - (a.elapsed||0));
  const ready = orders.filter(o => o.status === 'READY').sort((a,b) => (b.elapsed||0) - (a.elapsed||0));

  const Column = ({title, color, icon, items, count}) => (
    <div className="flex-1 min-w-0">
      <div className={`flex items-center gap-2 mb-3 px-1`}>
        <div className={`w-3 h-3 rounded-full ${color}`}/>
        <span className="font-bold text-sm text-gray-700">{title}</span>
        <span className="bg-gray-200 text-gray-600 text-xs font-bold px-1.5 py-0.5 rounded-full ml-auto">{count}</span>
      </div>
      <div className="space-y-2 overflow-y-auto hide-scroll" style={{maxHeight:'440px'}}>
        {items.length === 0 ? (
          <div className="text-center text-gray-300 text-sm py-8">—</div>
        ) : (
          items.map(o => <OrderCard key={o.id} order={o} onAccept={onAccept} onReject={onReject} onReady={onReady} onPickup={onPickup} onManualPickup={onManualPickup}/>)
        )}
      </div>
    </div>
  );

  return (
    <div className="flex gap-4 h-full p-4">
      <Column title={t('col.new')} color="bg-blue-500" items={ordered} count={ordered.length}/>
      <Column title={t('col.preparing')} color="bg-amber-500" items={preparing} count={preparing.length}/>
      <Column title={t('col.waiting')} color="bg-green-500" items={ready} count={ready.length}/>
    </div>
  );
};

function MerchantApp() {
  const [tab, setTab] = useState('orders');

  const [toast, setToast] = useState(null);
  const [completedToday, setCompletedToday] = useState(23);
  const [todayGMV, setTodayGMV] = useState(487.20);

  // BroadcastChannel 연동 상태
  const [channelConnected, setChannelConnected] = useState(false);

  // BroadcastChannel: Consumer 앱에서 들어오는 실제 주문 수신
  useEffect(() => {
    // 연결 확인용 ping
    tapikChannel.postMessage({ type: 'merchant.online', storeId: STORE.id, storeName: STORE.name });

    const handler = (e) => {
      if (e.data.type === 'order.placed') {
        setChannelConnected(true);
        const o = e.data.order;
        // Production: Receive only orders for this store (storeId or storeName matching)
        const isMyStore = (o.storeId === STORE.id) || (o.storeName === STORE.name);
        if (!isMyStore) return; // Filter: Ignore orders from other stores
        const newOrder = {
          id: o.id,
          customer: o.customerName || 'Consumer',
          isNew: true,
          items: o.items.map(i => ({name:i.name, qty:i.qty, price:i.basePrice})),
          total: o.total,
          status: 'ORDERED',
          time: now(),
          elapsed: 0,
          room: o.role !== 'solo' ? `RM-${Math.floor(Math.random()*100).toString().padStart(3,'0')}` : null,
          role: o.role || 'solo',
          isLive: true,
        };
        setOrders(prev => [newOrder, ...prev]);
        setToast({message:t('toast.liveOrder', {id: o.id}), type:'new'});
      }
      // Consumer가 보내는 ping 응답
      if (e.data.type === 'consumer.online') {
        setChannelConnected(true);
      }
    };
    tapikChannel.addEventListener('message', handler);
    return () => tapikChannel.removeEventListener('message', handler);
  }, []);

  // Firestore: 실시간 주문 수신 (ORDERED 상태인 이 매장 주문)
  useEffect(() => {
    if (!window.MFB) return;
    const q = MFB.query(MFB.collection(MFB.db, 'orders'), MFB.where('storeId', '==', STORE.id), MFB.where('status', '==', 'ORDERED'));
    const unsub = MFB.onSnapshot(q, (snap) => {
      snap.docChanges().forEach(change => {
        if (change.type === 'added') {
          const o = change.doc.data();
          // 이미 있으면 무시
          setOrders(prev => {
            if (prev.some(p => p.id === o.id)) return prev;
            const newOrder = {
              id: o.id,
              customer: o.customerName || 'Consumer',
              customerPhoto: o.customerPhoto || null,
              isNew: true,
              items: (o.items || []).map(i => ({name:i.name, qty:i.qty, price:i.basePrice || i.price})),
              total: o.total,
              status: 'ORDERED',
              time: now(),
              elapsed: 0,
              room: o.role !== 'solo' ? `RM-${Math.floor(Math.random()*100).toString().padStart(3,'0')}` : null,
              role: o.role || 'solo',
              isLive: true,
            };
            setToast({message:t('toast.firestoreOrder', {id: o.id}), type:'new'});
            return [newOrder, ...prev];
          });
        }
      });
    });
    return unsub;
  }, []);

  // 시뮬: 목업 주문 자동 생성 (토글 가능, 기본 OFF)
  const [simEnabled, setSimEnabled] = useState(false);
  const orderCounter = useRef(52);
  useEffect(() => {
    if (!isAccepting || !simEnabled) return;
    const names = ['Min J.','David C.','Aisyah R.','Tommy L.','Priya S.'];
    const menus = [
      [{name:'Iced Flat White', qty:1, price:14}],
      [{name:'Matcha Latte', qty:1, price:16},{name:'Avocado Toast', qty:1, price:22}],
      [{name:'Kaya Toast Set', qty:2, price:8}],
      [{name:'Smoked Salmon Bagel', qty:1, price:24}],
    ];
    const interval = setInterval(() => {
      const name = names[Math.floor(Math.random()*names.length)];
      const items = menus[Math.floor(Math.random()*menus.length)];
      const base = items.reduce((s,i)=>s+i.price*i.qty, 0);
      const total = Math.round(base * 1.05 * 100) / 100;
      const hasRoom = Math.random() > 0.7;
      const newOrder = {
        id:`TO-${String(orderCounter.current++).padStart(4,'0')}`,
        customer: name,
        isNew: Math.random() > 0.8,
        items, total,
        status:'ORDERED',
        time: now(),
        elapsed: 0,
        room: hasRoom ? `RM-${Math.floor(Math.random()*100).toString().padStart(3,'0')}` : null,
        role: hasRoom ? (Math.random()>0.5?'creator':'joiner') : 'solo',
      };
      setOrders(prev => [newOrder, ...prev]);
      setToast({message:t('toast.simOrder', {id: newOrder.id, name}), type:'new'});
    }, 15000);
    return () => clearInterval(interval);
  }, [isAccepting, simEnabled]);

  // 경과 시간 업데이트
  useEffect(() => {
    const interval = setInterval(() => {
      setOrders(prev => prev.map(o =>
        ['ORDERED','PREPARING','READY'].includes(o.status) ? {...o, elapsed: o.elapsed + 1} : o
      ));
    }, 60000);
    return () => clearInterval(interval);
  }, []);

  const handleAccept = async (id) => {
    setOrders(prev => prev.map(o => o.id === id ? {...o, status:'PREPARING', eta:10, elapsed:0, checklist:o.items.map(()=>false)} : o));
    setToast({message:t('toast.accepted', {id}), type:'success'});
    tapikChannel.postMessage({ type:'order.accepted', orderId:id });
    // Firestore 상태 업데이트
    try { if(window.MFB) await MFB.updateDoc(MFB.doc(MFB.db, 'orders', id), { status: 'PREPARING' }); } catch(e) { console.error('Firestore update error:', e); }
  };
  const handleReject = async (id) => {
    setOrders(prev => prev.filter(o => o.id !== id));
    setToast({message:t('toast.rejected', {id}), type:'warn'});
    tapikChannel.postMessage({ type:'order.rejected', orderId:id });
    try { if(window.MFB) await MFB.updateDoc(MFB.doc(MFB.db, 'orders', id), { status: 'REJECTED' }); } catch(e) {}
  };
  const handleReady = async (id) => {
    setOrders(prev => prev.map(o => o.id === id ? {...o, status:'READY', elapsed:0} : o));
    setToast({message:t('toast.ready', {id}), type:'success'});
    tapikChannel.postMessage({ type:'order.ready', orderId:id });
    try { if(window.MFB) await MFB.updateDoc(MFB.doc(MFB.db, 'orders', id), { status: 'READY' }); } catch(e) {}
  };
  const handlePickup = async (id) => {
    const order = orders.find(o => o.id === id);
    setOrders(prev => prev.filter(o => o.id !== id));
    if (order) {
      setCompletedToday(c => c + 1);
      setTodayGMV(g => Math.round((g + order.total) * 100) / 100);
    }
    setToast({message:t('toast.pickedUp', {id}), type:'success'});
    tapikChannel.postMessage({ type:'order.pickedUp', orderId:id, total: order?.total });
    try { if(window.MFB) await MFB.updateDoc(MFB.doc(MFB.db, 'orders', id), { status: 'PICKED_UP' }); } catch(e) {}
  };

  const tabs = [
    {id:'orders', icon:I.Package, label:t('tab.orders')},
    {id:'sales', icon:I.BarChart, label:t('tab.sales')},
    {id:'menu', icon:I.Menu, label:t('tab.menu')},
    {id:'customers', icon:I.Users, label:t('tab.customers')},
    {id:'adboard', icon:I.Megaphone, label:t('tab.adboard')},
    {id:'settings', icon:I.Settings, label:t('tab.settings')},
  ];

  const activeOrders = orders.filter(o => ['ORDERED','PREPARING','READY'].includes(o.status));
  const newCount = orders.filter(o => o.status === 'ORDERED').length;

  return (
    <div className="min-h-screen flex items-center justify-center py-6">
      <div className="tablet-frame">
        <div className="tablet-cam"/>
        <div className="tablet-screen">
          {/* Top bar */}
          <div className="bg-slate-800 text-white px-4 py-2 flex items-center justify-between flex-shrink-0">
            <div className="flex items-center gap-3">
              <TapikLogo size={22}/>
              <div className="border-l border-slate-600 pl-3">
                <div className="text-sm font-bold text-white leading-tight">{STORE.name}</div>
                <div className="text-[10px] text-slate-400">{STORE.area} · {t('topbar.commission')} {(STORE.commRate*100).toFixed(0)}%</div>
              </div>
            </div>
            <div className="flex items-center gap-4">
              <div className="text-xs text-white/70">{t('topbar.today')} <span className="text-white font-bold">{completedToday}</span> · <span className="text-green-400 font-bold tabular">RM {todayGMV.toFixed(2)}</span></div>
              <div className="flex items-center gap-2">
                <button onClick={()=>setIsAccepting(!isAccepting)} className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold transition ${isAccepting ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`}>
                  <I.Power s={12} c="text-white"/>{isAccepting ? t('topbar.accepting') : t('topbar.paused')}
                </button>
                <button onClick={()=>setLang(_currentLang === 'en' ? 'ko' : 'en')} className="px-2.5 py-1 bg-slate-600 hover:bg-slate-500 text-white text-xs font-bold rounded-full transition">
                  {_currentLang === 'en' ? 'EN' : 'KO'}
                </button>
                <div className="relative">
                  <I.Bell s={18} c="text-white/70"/>
                  {newCount > 0 && <div className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-[9px] flex items-center justify-center font-bold">{newCount}</div>}
                </div>
              </div>
            </div>
          </div>

          {/* Content area */}
          <div className="flex flex-1 overflow-hidden">
            {/* Left sidebar tabs */}
            <div className="w-16 bg-slate-700 flex flex-col items-center py-2 flex-shrink-0">
              {tabs.map(tb => (
                <button key={tb.id} onClick={()=>setTab(tb.id)}
                  className={`w-full flex flex-col items-center gap-0.5 py-2.5 transition relative ${tab===tb.id ? 'text-amber-400' : 'text-slate-400 hover:text-slate-200'}`}>
                  {tab===tb.id && <div className="absolute left-0 top-1 bottom-1 w-0.5 bg-amber-400 rounded-r"/>}
                  <tb.icon s={18} sw={tab===tb.id ? 2.5 : 1.5}/>
                  <span className="text-[9px] font-medium">{tb.label}</span>
                  {tb.id === 'orders' && newCount > 0 && (
                    <div className="absolute top-1 right-2 w-4 h-4 bg-red-500 rounded-full text-[8px] text-white flex items-center justify-center font-bold">{newCount}</div>
                  )}
                </button>
              ))}
            </div>

            {/* Main content */}
            <div className="flex-1 overflow-hidden bg-gray-50">
              {tab === 'orders' && <OrderQueue orders={activeOrders} onAccept={handleAccept} onReject={handleReject} onReady={handleReady} onPickup={handlePickup} onManualPickup={handlePickup}/>}
              {tab === 'sales' && <SalesTab/>}
              {tab === 'menu' && <MenuTab/>}
              {tab === 'customers' && <CustomersTab/>}
              {tab === 'adboard' && <AdBoardTab/>}
              {tab === 'settings' && <SettingsTab/>}
            </div>
          </div>
        </div>
      </div>

      {/* Connection status + Sim toggle */}
      <div className="fixed bottom-4 left-4 flex items-center gap-3 bg-slate-800/90 text-white text-[10px] px-3 py-1.5 rounded-full backdrop-blur">
        <div className="flex items-center gap-1.5">
          <div className={`w-2 h-2 rounded-full ${channelConnected ? 'bg-green-400' : 'bg-yellow-400'}`}/>
          {channelConnected ? t('status.consumerConnected') : t('status.consumerWaiting')}
        </div>
        <div className="w-px h-3 bg-slate-600"/>
        <button onClick={()=>setSimEnabled(!simEnabled)} className={`px-2 py-0.5 rounded text-[9px] font-bold ${simEnabled ? 'bg-amber-500 text-white' : 'bg-slate-600 text-slate-300'}`}>
          {simEnabled ? t('sim.on') : t('sim.off')}
        </button>
      </div>

      {/* Toast notification */}
      {toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MerchantApp/>);
</script>
</body>
</html>
